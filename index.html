<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Events Demo</title>
  <link rel="stylesheet" href="./style.css">
  <script src="./script.js" defer></script>
</head>

<body>
  <main>

    <header>
      <h1>JavaScript Events Demo</h1>
    </header>

    <!-- ─────────────────────────────────────────────
    SECTION 1 — CSS Class Toggle
    ────────────────────────────────────────────── -->
    <section id="section-toggle">
      <h2>1. CSS Class Toggle</h2>
      <p>
        Clicking the button adds or removes the <code>.is-active</code> class.
        The class change drives the visual state via CSS alone.
      </p>

      <button id="toggle-btn" type="button">Toggle me</button>
      <p>Status: <strong id="toggle-status">inactive</strong></p>
    </section>

  </main>
</body>

</html>
